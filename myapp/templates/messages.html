 <style>

        #toastContainer {
            position: fixed;
            top: 100px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index:100;
        }

        .toastNotification {
            background-color: #fff;
            color: #000;
            padding: 12px 20px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: right 0.5s ease-in-out, opacity 0.3s ease-in-out;
            opacity: 1;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            position: relative;
            right: -300px; /* Start off-screen */
        }

        .toastNotification.show {
            right: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        .close-btn:hover {
            color: red;
        }
    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <script>
        function showNotification(message) {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.classList.add('toastNotification');
            toast.innerHTML = `<span>${message}</span> <button class="close-btn" onclick="this.parentElement.remove()">✖</button>`;

            toastContainer.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 100); // Slide in

            setTimeout(() => {
                toast.classList.remove('show'); // Slide out
                setTimeout(() => toast.remove(), 500);
            }, 3000); // Disappear after 3 sec
        }
    </script>

    {% if messages %}
        {% for msg in messages %}
            <script>
                showNotification("{{ msg }}");
            </script>
        {% endfor %}
    {% endif %}

</body>
</html>
